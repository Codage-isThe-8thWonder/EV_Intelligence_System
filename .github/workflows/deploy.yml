name: Build Push Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend
      - name: Build Backend Image
        run: |
          docker build -t shreyash206/ev-backend:latest ./Backend

      - name: Push Backend Image
        run: |
          docker push shreyash206/ev-backend:latest

      # Frontend
      - name: Build Frontend Image
        run: |
          docker build -t shreyash206/ev-frontend:latest ./Frontend

      - name: Push Frontend Image
        run: |
          docker push shreyash206/ev-frontend:latest

      # Render Backend
      - name: Deploy Backend
        run: |
          curl "$BACKEND_RENDER_DEPLOY_HOOK"
        env:
          BACKEND_RENDER_DEPLOY_HOOK: ${{ secrets.BACKEND_RENDER_DEPLOY_HOOK }}

      # Render Frontend
      - name: Deploy Frontend
        run: |
          curl "$FRONTEND_RENDER_DEPLOY_HOOK"
        env:
          FRONTEND_RENDER_DEPLOY_HOOK: ${{ secrets.FRONTEND_RENDER_DEPLOY_HOOK }}